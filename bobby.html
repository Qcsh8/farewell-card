<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goodbye, Bobby! 💜</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/lunaire-tokens.css">
<link rel="stylesheet" href="css/lunaire-tokens-dark.css">
<link rel="stylesheet" href="css/lunaire-typography.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body class="bobby-view">

  <div class="aurora-bg" aria-hidden="true">

    <div class="parallax-layer" data-depth="6">
      <div class="milkyway"></div>
      <div class="stardust stardust-small"></div>
    </div>

    <div class="parallax-layer" data-depth="16">
      <span class="blob blob1"></span>
      <span class="blob blob2"></span>
      <span class="blob blob3"></span>
      <span class="blob blob4"></span>
      <span class="blob blob5"></span>
      <span class="blob blob6"></span>
      <span class="ring ring-tr"></span>
      <span class="ring ring-bl"></span>
      <div class="stardust stardust-big"></div>
    </div>

    <div class="parallax-layer" data-depth="32">
      <svg class="spark spark-a" viewBox="0 0 32 32" fill="none"><path d="M16 0L17.4 14.6L32 16L17.4 17.4L16 32L14.6 17.4L0 16L14.6 14.6Z" fill="#a8c4d4"/></svg>
      <svg class="spark spark-b" viewBox="0 0 32 32" fill="none"><path d="M16 0L17.4 14.6L32 16L17.4 17.4L16 32L14.6 17.4L0 16L14.6 14.6Z" fill="#7a7290"/></svg>
      <svg class="spark spark-c" viewBox="0 0 32 32" fill="none"><path d="M16 0L17.4 14.6L32 16L17.4 17.4L16 32L14.6 17.4L0 16L14.6 14.6Z" fill="#109de3"/></svg>
      <svg class="spark spark-d" viewBox="0 0 32 32" fill="none"><path d="M16 0L17.4 14.6L32 16L17.4 17.4L16 32L14.6 17.4L0 16L14.6 14.6Z" fill="#a8c4d4"/></svg>
      <svg class="spark spark-e" viewBox="0 0 32 32" fill="none"><path d="M16 0L17.4 14.6L32 16L17.4 17.4L16 32L14.6 17.4L0 16L14.6 14.6Z" fill="#109de3"/></svg>
      <svg class="spark spark-f" viewBox="0 0 32 32" fill="none"><path d="M16 0L17.4 14.6L32 16L17.4 17.4L16 32L14.6 17.4L0 16L14.6 14.6Z" fill="#7a7290"/></svg>
    </div>

  </div>

  <header class="hero">
    <div class="hero-inner">
      <img class="hero-photo" src="assets/bobby-photo.png" alt="Bobby">
      <p class="hero-eyebrow desktop-label-bold">A FOND FAREWELL</p>
      <h1 class="hero-title desktop-header-1-bold">Goodbye, Bobby! 👋</h1>
      <p class="hero-subtitle desktop-body-regular">
        Every great chapter deserves a great send-off. Wishing you nothing but
        good fortune, fun, and new adventures ahead — you'll be missed around here.
      </p>
    </div>
  </header>

  <main class="container container-readonly">

    <section class="guestbook" aria-labelledby="guestbook-heading">
      <div class="guestbook-heading-row">
        <h2 id="guestbook-heading" class="desktop-header-5-bold">Messages for you, Bobby</h2>
        <span id="message-count" class="desktop-sub-body-medium">0 signatures</span>
      </div>

      <div id="empty-state" class="empty-state desktop-body-regular">
        No messages yet.
      </div>

      <div id="message-grid" class="message-grid"></div>
    </section>

  </main>

  <footer class="site-footer desktop-footnote-regular">
    Made with 💜 to send Bobby off in style.
  </footer>

  <script src="js/parallax.js"></script>
  <script src="js/guestbook.js"></script>
</body>
</html>

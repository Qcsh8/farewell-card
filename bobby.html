<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goodbye, Bobby! 💜</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/lunaire-tokens.css">
<link rel="stylesheet" href="css/lunaire-tokens-dark.css">
<link rel="stylesheet" href="css/lunaire-typography.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body class="bobby-view">

  <div class="aurora-bg" aria-hidden="true">
    <span class="blob blob-a"></span>
    <span class="blob blob-b"></span>
    <span class="blob blob-c"></span>
    <span class="blob blob-d"></span>
    <span class="blob blob-e"></span>
    <span class="blob blob-f"></span>
    <span class="blob blob-g"></span>

    <div class="moon"></div>

    <div class="stars">
      <span class="star" style="top:6%; left:8%; --delay:0.2s; --dur:2.6s;"></span>
      <span class="star star-lg" style="top:11%; left:22%; --delay:1.4s; --dur:3.2s;"></span>
      <span class="star" style="top:4%; left:38%; --delay:0.8s; --dur:2.8s;"></span>
      <span class="star" style="top:15%; left:52%; --delay:2.1s; --dur:3.6s;"></span>
      <span class="star star-lg" style="top:8%; left:68%; --delay:0.4s; --dur:3s;"></span>
      <span class="star" style="top:18%; left:80%; --delay:1.7s; --dur:2.4s;"></span>
      <span class="star" style="top:3%; left:92%; --delay:0.9s; --dur:3.4s;"></span>
      <span class="star" style="top:24%; left:5%; --delay:1.1s; --dur:2.9s;"></span>
      <span class="star star-lg" style="top:28%; left:18%; --delay:2.4s; --dur:3.1s;"></span>
      <span class="star" style="top:22%; left:34%; --delay:0.3s; --dur:2.7s;"></span>
      <span class="star" style="top:30%; left:48%; --delay:1.6s; --dur:3.3s;"></span>
      <span class="star" style="top:20%; left:62%; --delay:0.6s; --dur:2.5s;"></span>
      <span class="star star-lg" style="top:26%; left:75%; --delay:1.9s; --dur:3.5s;"></span>
      <span class="star" style="top:32%; left:90%; --delay:1.0s; --dur:2.9s;"></span>
      <span class="star" style="top:40%; left:12%; --delay:2.2s; --dur:3.0s;"></span>
      <span class="star" style="top:45%; left:28%; --delay:0.5s; --dur:2.6s;"></span>
      <span class="star star-lg" style="top:42%; left:58%; --delay:1.3s; --dur:3.4s;"></span>
      <span class="star" style="top:48%; left:72%; --delay:0.7s; --dur:2.8s;"></span>
      <span class="star" style="top:38%; left:85%; --delay:2.0s; --dur:3.2s;"></span>
      <span class="star" style="top:55%; left:4%; --delay:1.5s; --dur:2.7s;"></span>
      <span class="star star-lg" style="top:60%; left:20%; --delay:0.1s; --dur:3.1s;"></span>
      <span class="star" style="top:64%; left:40%; --delay:1.8s; --dur:2.5s;"></span>
      <span class="star" style="top:58%; left:55%; --delay:0.9s; --dur:3.3s;"></span>
      <span class="star" style="top:66%; left:78%; --delay:2.3s; --dur:2.9s;"></span>
      <span class="star star-lg" style="top:62%; left:94%; --delay:0.4s; --dur:3.6s;"></span>
      <span class="star" style="top:72%; left:10%; --delay:1.2s; --dur:2.6s;"></span>
      <span class="star" style="top:78%; left:30%; --delay:0.6s; --dur:3.0s;"></span>
      <span class="star" style="top:74%; left:50%; --delay:1.9s; --dur:2.8s;"></span>
      <span class="star star-lg" style="top:80%; left:67%; --delay:0.3s; --dur:3.4s;"></span>
      <span class="star" style="top:76%; left:88%; --delay:1.6s; --dur:2.5s;"></span>
    </div>
  </div>

  <header class="hero">
    <div class="hero-inner">
      <img class="hero-photo" src="assets/bobby-photo.png" alt="Bobby">
      <p class="hero-eyebrow desktop-label-bold">A FOND FAREWELL</p>
      <h1 class="hero-title desktop-header-1-bold">Goodbye, Bobby! 👋</h1>
      <p class="hero-subtitle desktop-body-regular">
        Every great chapter deserves a great send-off. Wishing you nothing but
        good fortune, fun, and new adventures ahead — you'll be missed around here.
      </p>
    </div>
  </header>

  <main class="container container-readonly">

    <section class="guestbook" aria-labelledby="guestbook-heading">
      <div class="guestbook-heading-row">
        <h2 id="guestbook-heading" class="desktop-header-5-bold">Messages for you, Bobby</h2>
        <span id="message-count" class="desktop-sub-body-medium">0 signatures</span>
      </div>

      <div id="empty-state" class="empty-state desktop-body-regular">
        No messages yet.
      </div>

      <div id="message-grid" class="message-grid"></div>
    </section>

  </main>

  <footer class="site-footer desktop-footnote-regular">
    Made with 💜 to send Bobby off in style.
  </footer>

  <script src="js/guestbook.js"></script>
</body>
</html>
